services:
  postgres:
    image: postgres:16-alpine
    container_name: orderservice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orderservice}
      POSTGRES_USER: ${POSTGRES_USER:-orderuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orderpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orderuser} -d ${POSTGRES_DB:-orderservice}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/OrderService.Api/Dockerfile
    container_name: orderservice-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-orderservice};
        Username=${POSTGRES_USER:-orderuser};
        Password=${POSTGRES_PASSWORD:-orderpass};
        Pooling=true;
      Jwt__SecretKey: ${JWT_SECRET_KEY:-super-secret-key-change-in-production-min32chars}
      Jwt__Issuer: ${JWT_ISSUER:-OrderService}
      Jwt__Audience: ${JWT_AUDIENCE:-OrderServiceClients}
      Jwt__ExpirationMinutes: ${JWT_EXPIRATION_MINUTES:-60}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
